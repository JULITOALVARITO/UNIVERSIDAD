<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclutamiento de Clan</title>
    <style>
        /* Fondo negro y centrado total */
        body { 
            background: #000; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* Cuadro de la broma */
        #cuadro-reclutamiento { 
            background: #fff; 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            position: absolute; 
            width: 350px; 
            z-index: 10; 
            transition: all 0.1s ease; 
            box-shadow: 0 10px 40px rgba(255,255,255,0.2); 
        }

        /* Contenedor del video (oculto al inicio) */
        #contenedor-video { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 100; 
        }

        /* Iframe de Streamable configurado */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        h2 { color: #333; margin-bottom: 30px; font-size: 24px; }

        .botones { 
            display: flex; 
            justify-content: space-around; 
        }

        button { 
            padding: 15px 35px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 12px; 
            border: none; 
            font-size: 18px; 
            transition: transform 0.1s; 
        }

        #btn-si { background: #28a745; color: #fff; }
        #btn-no { background: #dc3545; color: #fff; }
        
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="cuadro-reclutamiento">
        <h2>¿TE QUIERES UNIR AL CLAN?</h2>
        <div class="botones">
            <button id="btn-si">SÍ</button>
            <button id="btn-no">NO</button>
        </div>
    </div>

    <div id="contenedor-video">
        </div>

    <script>
        const cuadro = document.getElementById('cuadro-reclutamiento');
        const btnNo = document.getElementById('btn-no');
        const btnSi = document.getElementById('btn-si');
        const contenedorVideo = document.getElementById('contenedor-video');

        // Función para que el cuadro escape
        function mover() {
            const x = Math.random() * (window.innerWidth - cuadro.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - cuadro.offsetHeight - 20);
            
            cuadro.style.left = `${Math.max(10, x)}px`;
            cuadro.style.top = `${Math.max(10, y)}px`;
            
            let nuevoAncho = 300 + Math.floor(Math.random() * 100);
            cuadro.style.width = nuevoAncho + "px";
        }

        btnNo.addEventListener('mouseover', mover);
        btnNo.addEventListener('touchstart', mover);
        btnNo.addEventListener('click', mover);

        // Al lograr darle al SÍ
        btnSi.addEventListener('click', () => {
            cuadro.style.display = 'none';
            contenedorVideo.style.display = 'block';
            
            // Insertamos el iframe de Streamable con autoplay activado
            contenedorVideo.innerHTML = `
                <iframe 
                    src="https://streamable.com/e/dlfhhy?autoplay=1&nocontrols=1" 
                    allow="autoplay" 
                    allowfullscreen>
                </iframe>`;
        });
    </script>
</body>
</html>
